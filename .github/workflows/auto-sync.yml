name: Auto Sync (Codef + Mercury)

# 매일 오전 9시 KST (= UTC 00:00) 에 backend 의 /cron/auto-sync 호출.
# Vercel serverless 는 in-process scheduler 못 쓰므로 GitHub Actions 가 외부 트리거.
# 모든 entity × org Codef sync + Mercury HOI sync (transactions + balance + historical).
#
# 빈도 결정 (2026-05-04):
# - Codef 운영(api.codef.io)은 호출당 과금 → 비용 최소화 목적으로 1회/일.
# - 9시 = 전날 거래 정산 완료 후. 추가 동기화는 UI의 "수동 동기화" 버튼으로.

on:
  schedule:
    # cron 은 UTC. KST 09:00 = UTC 00:00.
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 트리거 가능

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit auto-sync endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # BACKEND_URL 미설정 시 default production 사용
          URL="${BACKEND_URL:-https://financeone-api.vercel.app}/api/integrations/cron/auto-sync"
          echo "Triggering: $URL"

          if [ -n "$CRON_SECRET" ]; then
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 540 \
              "$URL")
          else
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              --max-time 540 \
              "$URL")
          fi

          echo "HTTP $HTTP_CODE"
          cat response.json | head -200 || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::auto-sync failed with HTTP $HTTP_CODE"
            exit 1
          fi
