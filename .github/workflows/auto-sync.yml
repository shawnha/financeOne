name: Auto Sync (Codef + Mercury)

# 120분(2시간)마다 backend 의 /cron/auto-sync 호출
# Vercel serverless 는 in-process scheduler 못 쓰므로 GitHub Actions 가 외부 트리거.
# 모든 entity × org Codef sync + Mercury HOI sync (transactions + balance + historical).

on:
  schedule:
    # KST 짝수 정각 (00, 02, 04, ..., 22 시) — UTC 로는 한 시간 빨리 시작
    # cron 은 UTC. 0 */2 * * * → UTC 0,2,4,...,22 → KST 9,11,13,...,7
    # KST 정각으로 맞추려면: 0 15,17,19,21,23,1,3,5,7,9,11,13 * * * (UTC)
    # 단순화: 매 2시간마다 (정확한 KST 시각 무관)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 수동 트리거 가능

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit auto-sync endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # BACKEND_URL 미설정 시 default production 사용
          URL="${BACKEND_URL:-https://financeone-api.vercel.app}/api/integrations/cron/auto-sync"
          echo "Triggering: $URL"

          if [ -n "$CRON_SECRET" ]; then
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 540 \
              "$URL")
          else
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              --max-time 540 \
              "$URL")
          fi

          echo "HTTP $HTTP_CODE"
          cat response.json | head -200 || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::auto-sync failed with HTTP $HTTP_CODE"
            exit 1
          fi
